<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="upload-zone" class="max-w-2xl mx-auto mt-20 p-10 border-2 border-dashed border-sky-500 rounded-xl text-center">
        <h1 class="text-3xl font-bold mb-4">Cloud Resume Parser</h1>
        <p class="text-slate-400 mb-8">Upload your PDF/Text resume and the Cloud will build your portfolio instantly.</p>
        
        <input type="file" id="resumeInput" class="hidden" onchange="handleUpload()">
        <button onclick="document.getElementById('resumeInput').click()" class="bg-sky-500 hover:bg-sky-600 px-8 py-3 rounded-full font-bold transition">
            Upload Resume
        </button>
        <div id="loading" class="hidden mt-4 text-sky-400 animate-pulse">AI is reading your resume...</div>
    </div>

    <div id="portfolio-output" class="hidden max-w-4xl mx-auto mt-10 p-8 bg-slate-800 rounded-2xl shadow-2xl">
        <header class="border-b border-slate-700 pb-6 mb-6">
            <h1 id="out-name" class="text-4xl font-bold text-sky-400"></h1>
            <p id="out-title" class="text-xl text-slate-300"></p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-sky-300">Technical Expertise</h2>
                <div id="out-skills" class="flex flex-wrap gap-2"></div>
            </div>
            <div>
                <h2 class="text-xl font-semibold mb-4 text-sky-300">Key Projects</h2>
                <div id="out-projects" class="space-y-4"></div>
            </div>
        </div>
    </div>

   <script>
    async function handleUpload() {
        const fileInput = document.getElementById('resumeInput');
        const loader = document.getElementById('loading');
        
        if (!fileInput.files[0]) return;
        
        loader.classList.remove('hidden');
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            
            // LOGIC: This is a simple 'Parser' that looks for data in the text
            const extractedData = {
                name: "User Detected", // Default if not found
                title: "Professional Profile",
                skills: [],
                projects: []
            };

            // Basic AI simulation: Splitting text to find details
            const lines = text.split('\n');
            
            // Grab the first line as the Name
            if(lines[0]) extractedData.name = lines[0].toUpperCase();
            
            // Search for Skills (Simple Keyword matching)
            const commonSkills = ["Python", "Java", "SQL", "C++", "React", "AI", "Machine Learning", "Cloud"];
            commonSkills.forEach(skill => {
                if(text.toLowerCase().includes(skill.toLowerCase())) {
                    extractedData.skills.push(skill);
                }
            });

            // If no skills found, give a default
            if(extractedData.skills.length === 0) extractedData.skills = ["General Expertise"];

            displayPortfolio(extractedData);
        };

        // Read the file as text
        reader.readAsText(file);
    }

    function displayPortfolio(data) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('upload-zone').classList.add('hidden');
        document.getElementById('portfolio-output').classList.remove('hidden');

        document.getElementById('out-name').innerText = data.name;
        document.getElementById('out-title').innerText = data.title;

        const skillDiv = document.getElementById('out-skills');
        skillDiv.innerHTML = ""; // Clear old data
        data.skills.forEach(s => {
            skillDiv.innerHTML += `<span class="bg-slate-700 px-3 py-1 rounded-md border border-sky-500/30 text-sky-400 text-sm">${s}</span>`;
        });
    }
</script>
</body>
</html>
